<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Persona Profile — Knowledge Graph</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #0a0a0f; color: #e4e4e7; overflow: hidden; }
    #graph { flex: 1; }
    #sidebar { width: 340px; padding: 18px; background: #18181b; border-left: 1px solid #27272a; overflow-y: auto; }
    #sidebar h2 { margin: 0 0 4px 0; font-size: 18px; word-break: break-word; }
    #sidebar .type { color: #71717a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
    #sidebar .metric { display: flex; justify-content: space-between; margin: 6px 0 2px; font-size: 13px; }
    #sidebar .metric span:last-child { color: #a1a1aa; font-family: ui-monospace, monospace; }
    #sidebar .bar { height: 4px; background: #27272a; border-radius: 2px; margin-bottom: 10px; }
    #sidebar .bar > div { height: 100%; background: #3b82f6; border-radius: 2px; transition: width .2s; }
    #sidebar hr { border: none; border-top: 1px solid #27272a; margin: 16px 0; }
    #sidebar .cluster-hdr { font-weight: 600; margin-bottom: 4px; }
    #sidebar .cluster-sub { font-size: 12px; color: #71717a; margin-bottom: 10px; }
    #sidebar .neighbor-list { font-size: 12px; }
    #sidebar .neighbor { padding: 4px 8px; margin: 2px 0; background: #27272a; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    #sidebar .neighbor:hover { background: #3f3f46; }
    #sidebar .neighbor .nbr-weight { color: #71717a; font-family: ui-monospace, monospace; font-size: 10px; }
    #legend { position: absolute; top: 12px; left: 12px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 6px; padding: 10px 12px; font-size: 12px; max-width: 220px; }
    #legend .hdr { font-weight: 600; margin-bottom: 6px; }
    #legend .row { display: flex; align-items: center; margin: 3px 0; cursor: pointer; }
    #legend .row:hover { opacity: 0.7; }
    #legend .swatch { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    #legend .cnt { color: #52525b; margin-left: auto; padding-left: 6px; font-size: 10px; }
    #status { position: absolute; bottom: 12px; left: 12px; font-size: 11px; color: #52525b; font-family: ui-monospace, monospace; }
    #help { position: absolute; bottom: 12px; right: 360px; font-size: 10px; color: #3f3f46; }
    .node { cursor: pointer; transition: stroke .15s; }
    .node.selected { stroke: #fff; stroke-width: 3; }
    .node.dimmed { opacity: 0.15; }
    .node-label { font-size: 10px; fill: #a1a1aa; pointer-events: none; user-select: none; }
    .node-label.dimmed { opacity: 0.1; }
    .edge { stroke: #3f3f46; stroke-opacity: 0.4; transition: stroke .15s, stroke-opacity .15s; }
    .edge.highlight { stroke: #60a5fa; stroke-opacity: 0.9; }
    .edge.dimmed { stroke-opacity: 0.05; }
  </style>
</head>
<body>
  <svg id="graph"></svg>
  <div id="sidebar">
    <h2 id="sel-label">Click a node</h2>
    <div class="type" id="sel-type"></div>
    <div id="sel-metrics"></div>
    <hr>
    <div id="cluster-info"></div>
    <hr>
    <div class="cluster-hdr">Connections</div>
    <div id="neighbors" class="neighbor-list"></div>
  </div>
  <div id="legend"></div>
  <div id="status">Loading…</div>
  <div id="help">click node · drag to reposition · scroll to zoom · click cluster in legend to isolate · esc to clear</div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const PALETTE = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#06b6d4','#a855f7'];

    const status = document.getElementById('status');
    status.textContent = 'Fetching /api/graph…';

    let G = { nodes: [], links: [], clusters: [] };
    let nodeById = {}, clusterById = {}, neighborsOf = {};
    let selectedId = null, isolatedCluster = null;
    let nodeSel, linkSel, labelSel;

    fetch('/api/graph').then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error(`${r.status}: ${t}`); });
      return r.json();
    }).then(render).catch(e => {
      status.textContent = `ERROR: ${e.message}`;
      status.style.color = '#ef4444';
    });

    function render(data) {
      const { nodes, edges, clusters, modularity } = data;
      status.textContent = `${nodes.length} nodes · ${edges.length} edges · ${clusters.length} clusters · Q=${modularity.toFixed(3)}`;

      nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));
      clusterById = Object.fromEntries(clusters.map(c => [c.id, c]));
      const links = edges.map(e => ({ source: e.source_id, target: e.target_id, weight: e.weight }));

      // neighbor adjacency
      neighborsOf = {};
      for (const n of nodes) neighborsOf[n.id] = [];
      for (const e of edges) {
        neighborsOf[e.source_id].push({ id: e.target_id, weight: e.weight });
        neighborsOf[e.target_id].push({ id: e.source_id, weight: e.weight });
      }
      for (const id in neighborsOf) neighborsOf[id].sort((a,b) => b.weight - a.weight);

      G = { nodes, links, clusters };

      // legend with cluster isolate
      const legend = document.getElementById('legend');
      legend.innerHTML = '<div class="hdr">Clusters</div>' +
        clusters.map(c =>
          `<div class="row" data-cid="${c.id}">` +
          `<span class="swatch" style="background:${PALETTE[c.id % PALETTE.length]}"></span>` +
          `<span title="${c.dominant_type}">${escapeHtml(c.label)}</span>` +
          `<span class="cnt">${c.node_count}</span></div>`
        ).join('');
      legend.querySelectorAll('.row').forEach(row => {
        row.addEventListener('click', () => {
          const cid = parseInt(row.dataset.cid);
          isolatedCluster = (isolatedCluster === cid) ? null : cid;
          applyFilter();
        });
      });

      const svg = d3.select('#graph');
      const rect = svg.node().getBoundingClientRect();
      const W = rect.width, H = rect.height;
      svg.attr('viewBox', [0, 0, W, H]);

      const g = svg.append('g');
      svg.call(d3.zoom().scaleExtent([0.15, 6]).on('zoom', (e) => g.attr('transform', e.transform)));

      const radiusOf = d => 4 + d.degree_centrality * 20;

      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(70).strength(l => Math.min(1, l.weight / 5)))
        .force('charge', d3.forceManyBody().strength(-140))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collide', d3.forceCollide().radius(d => radiusOf(d) + 4));

      linkSel = g.append('g').selectAll('line').data(links).join('line')
        .attr('class', 'edge')
        .attr('stroke-width', d => Math.min(5, 1 + d.weight * 0.4));

      nodeSel = g.append('g').selectAll('circle').data(nodes).join('circle')
        .attr('class', 'node')
        .attr('r', radiusOf)
        .attr('fill', d => PALETTE[d.cluster_id % PALETTE.length])
        .attr('stroke', d => d.betweenness_centrality > 0.1 ? '#fff' : 'none')
        .attr('stroke-width', d => d.betweenness_centrality > 0.1 ? 2 : 0)
        .on('click', (_, d) => selectNode(d))
        .call(drag(sim));

      nodeSel.append('title').text(d => `${d.label} (${d.node_type})`);

      labelSel = g.append('g').selectAll('text').data(nodes).join('text')
        .attr('class', 'node-label')
        .text(d => d.degree_centrality > 0.12 ? d.label : '')
        .attr('dy', d => -radiusOf(d) - 4);

      sim.on('tick', () => {
        linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
               .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeSel.attr('cx', d => d.x).attr('cy', d => d.y);
        labelSel.attr('x', d => d.x).attr('y', d => d.y);
      });

      // auto-select highest betweenness
      if (nodes.length) {
        const top = nodes.reduce((a, b) => a.betweenness_centrality > b.betweenness_centrality ? a : b);
        selectNode(top);
      }

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { isolatedCluster = null; applyFilter(); clearSelection(); }
      });
    }

    function selectNode(d) {
      selectedId = d.id;
      document.getElementById('sel-label').textContent = d.label;
      document.getElementById('sel-type').textContent = `${d.node_type} · cluster #${d.cluster_id}`;

      const m = document.getElementById('sel-metrics');
      m.innerHTML = '';
      for (const [name, val] of [
        ['Degree', d.degree_centrality],
        ['Betweenness', d.betweenness_centrality],
        ['Closeness', d.closeness_centrality],
      ]) {
        m.innerHTML += `<div class="metric"><span>${name}</span><span>${val.toFixed(4)}</span></div>` +
                       `<div class="bar"><div style="width:${Math.min(100, val*100).toFixed(1)}%"></div></div>`;
      }

      const c = clusterById[d.cluster_id];
      document.getElementById('cluster-info').innerHTML = c
        ? `<div class="cluster-hdr">Cluster: ${escapeHtml(c.label)}</div>` +
          `<div class="cluster-sub">${c.node_count} nodes · ${c.dominant_type}</div>`
        : '';

      // neighbor list (clickable)
      const nbrs = neighborsOf[d.id] || [];
      const nbrEl = document.getElementById('neighbors');
      nbrEl.innerHTML = nbrs.slice(0, 20).map(n => {
        const nn = nodeById[n.id];
        const color = PALETTE[nn.cluster_id % PALETTE.length];
        return `<div class="neighbor" data-nid="${escapeHtml(n.id)}">` +
               `<span><span style="color:${color}">●</span> ${escapeHtml(nn.label)}</span>` +
               `<span class="nbr-weight">×${n.weight.toFixed(0)}</span></div>`;
      }).join('') || '<div style="color:#52525b;font-size:11px;">no connections</div>';
      nbrEl.querySelectorAll('.neighbor').forEach(el => {
        el.addEventListener('click', () => {
          const nn = nodeById[el.dataset.nid];
          if (nn) selectNode(nn);
        });
      });

      applyFilter();
    }

    function clearSelection() {
      selectedId = null;
      nodeSel.classed('selected', false);
      applyFilter();
    }

    function applyFilter() {
      // neighbor-highlight set
      const nbrSet = selectedId
        ? new Set([selectedId, ...(neighborsOf[selectedId] || []).map(n => n.id)])
        : null;

      nodeSel
        .classed('selected', d => d.id === selectedId)
        .classed('dimmed', d => {
          if (isolatedCluster !== null && d.cluster_id !== isolatedCluster) return true;
          if (nbrSet && !nbrSet.has(d.id)) return true;
          return false;
        });

      labelSel.classed('dimmed', d => {
        if (isolatedCluster !== null && d.cluster_id !== isolatedCluster) return true;
        if (nbrSet && !nbrSet.has(d.id)) return true;
        return false;
      });

      linkSel
        .classed('highlight', l => selectedId && (l.source.id === selectedId || l.target.id === selectedId))
        .classed('dimmed', l => {
          if (isolatedCluster !== null &&
              !(l.source.cluster_id === isolatedCluster && l.target.cluster_id === isolatedCluster))
            return true;
          if (nbrSet && !(nbrSet.has(l.source.id) && nbrSet.has(l.target.id))) return true;
          return false;
        });
    }

    function drag(sim) {
      return d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
